<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  body { width: 240px; height: 240px; background: transparent; }
  .avatar {
    width: 240px;
    height: 240px;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    border-radius: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .icon {
    font-size: 88px;
    line-height: 1;
  }
  .text {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
  }
  .sub {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="avatar">
    <div class="icon">🤖</div>
    <div class="text">AI资讯</div>
    <div class="sub">每日推送</div>
  </div>
</body>
</html>
