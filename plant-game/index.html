<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>植物养成</title>
<link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; }
body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #FFF5F8 0%, #F5F9FF 50%, #F0F8F5 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* 背景装饰 */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  right: -10%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255, 182, 217, 0.1) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  bottom: -30%;
  left: -5%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(200, 230, 201, 0.1) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.container {
  background: white;
  border-radius: 40px;
  padding: 50px 35px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(200, 96, 122, 0.08);
  text-align: center;
  position: relative;
  z-index: 1;
  border: 2px solid rgba(255, 182, 217, 0.2);
}

.header {
  margin-bottom: 30px;
}

h1 {
  color: #C8607A;
  font-size: 28px;
  margin-bottom: 8px;
  letter-spacing: 1px;
  font-weight: 700;
}

.header-info {
  font-size: 13px;
  color: #A0A0A0;
  letter-spacing: 0.5px;
  font-weight: 300;
}

.plant-area {
  background: linear-gradient(135deg, #FFF9FB 0%, #F5F9FF 50%, #F0F8F5 100%);
  border-radius: 30px;
  padding: 50px 25px;
  margin-bottom: 35px;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  border: 2px dashed rgba(200, 96, 122, 0.15);
  overflow: hidden;
}

.plant-area::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(to top, rgba(139, 110, 99, 0.08), transparent);
  border-radius: 30px;
}

.plant-status {
  position: absolute;
  top: 15px;
  right: 15px;
  font-size: 12px;
  padding: 8px 14px;
  background: rgba(255, 182, 217, 0.15);
  border-radius: 20px;
  color: #C8607A;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.plant-svg {
  width: 140px;
  height: 140px;
  margin-bottom: 20px;
  filter: drop-shadow(0 4px 8px rgba(200, 96, 122, 0.1));
}

.plant-name {
  font-size: 20px;
  font-weight: 700;
  color: #C8607A;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.plant-stage {
  font-size: 12px;
  color: #A0A0A0;
  margin-bottom: 15px;
  letter-spacing: 1px;
  font-weight: 300;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 30px;
}

.stat {
  background: linear-gradient(135deg, rgba(255, 182, 217, 0.08) 0%, rgba(200, 230, 201, 0.08) 100%);
  border-radius: 18px;
  padding: 14px;
  border: 1.5px solid rgba(200, 96, 122, 0.1);
}

.stat-label {
  font-size: 11px;
  color: #C8607A;
  margin-bottom: 8px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.stat-bar {
  width: 100%;
  height: 8px;
  background: rgba(200, 96, 122, 0.1);
  border-radius: 4px;
  overflow: hidden;
}

.stat-fill {
  height: 100%;
  background: linear-gradient(90deg, #FFB6D9 0%, #FF69B4 100%);
  border-radius: 4px;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 25px;
}

.btn {
  padding: 14px 16px;
  border: 2px solid rgba(200, 96, 122, 0.2);
  background: linear-gradient(135deg, rgba(255, 182, 217, 0.1) 0%, rgba(255, 192, 203, 0.05) 100%);
  border-radius: 18px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: #C8607A;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: 'Noto Sans SC', sans-serif;
  letter-spacing: 0.5px;
}

.btn:hover {
  background: linear-gradient(135deg, rgba(255, 182, 217, 0.2) 0%, rgba(255, 192, 203, 0.15) 100%);
  border-color: rgba(200, 96, 122, 0.4);
  transform: translateY(-3px);
  box-shadow: 0 8px 16px rgba(200, 96, 122, 0.12);
}

.btn:active {
  transform: translateY(-1px);
}

.btn-icon {
  font-size: 22px;
  display: block;
  margin-bottom: 4px;
}

.message {
  font-size: 12px;
  color: #C8607A;
  margin-bottom: 20px;
  min-height: 18px;
  animation: fadeIn 0.3s ease;
  font-weight: 500;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

.shop-section {
  background: linear-gradient(135deg, rgba(255, 182, 217, 0.08) 0%, rgba(255, 192, 203, 0.05) 100%);
  border-radius: 25px;
  padding: 22px;
  margin-bottom: 25px;
  border: 2px solid rgba(200, 96, 122, 0.15);
}

.shop-title {
  font-size: 14px;
  font-weight: 700;
  color: #C8607A;
  margin-bottom: 14px;
  letter-spacing: 0.5px;
}

.shop-items {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.shop-item {
  background: white;
  border: 2px solid rgba(200, 96, 122, 0.12);
  border-radius: 16px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.shop-item:hover {
  background: linear-gradient(135deg, rgba(255, 182, 217, 0.1) 0%, rgba(255, 192, 203, 0.05) 100%);
  border-color: rgba(200, 96, 122, 0.3);
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(200, 96, 122, 0.1);
}

.item-icon {
  font-size: 28px;
  margin-bottom: 6px;
}

.item-name {
  font-size: 12px;
  font-weight: 700;
  color: #C8607A;
  margin-bottom: 4px;
}

.item-price {
  font-size: 11px;
  color: #FF69B4;
  font-weight: 700;
}

.item-desc {
  font-size: 10px;
  color: #A0A0A0;
  margin-top: 4px;
}

.bottom-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.reset-btn {
  padding: 12px;
  background: linear-gradient(135deg, rgba(200, 230, 201, 0.15) 0%, rgba(200, 230, 201, 0.08) 100%);
  border: 2px solid rgba(102, 187, 106, 0.2);
  border-radius: 16px;
  color: #558B2F;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.3s;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.reset-btn:hover {
  background: linear-gradient(135deg, rgba(200, 230, 201, 0.25) 0%, rgba(200, 230, 201, 0.15) 100%);
  border-color: rgba(102, 187, 106, 0.4);
  transform: translateY(-2px);
}

.support-btn {
  padding: 12px;
  background: linear-gradient(135deg, rgba(255, 182, 217, 0.2) 0%, rgba(255, 192, 203, 0.15) 100%);
  border: 2px solid rgba(200, 96, 122, 0.25);
  border-radius: 16px;
  color: #C8607A;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.3s;
  letter-spacing: 0.5px;
}

.support-btn:hover {
  background: linear-gradient(135deg, rgba(255, 182, 217, 0.3) 0%, rgba(255, 192, 203, 0.25) 100%);
  border-color: rgba(200, 96, 122, 0.4);
  transform: translateY(-2px);
}

.dead-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  backdrop-filter: blur(4px);
}

.dead-modal {
  background: white;
  border-radius: 30px;
  padding: 40px 30px;
  text-align: center;
  max-width: 320px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
  border: 2px solid rgba(255, 182, 217, 0.2);
}

.dead-modal h2 {
  color: #C8607A;
  margin-bottom: 12px;
  font-size: 22px;
  font-weight: 700;
}

.dead-modal p {
  color: #A0A0A0;
  margin-bottom: 25px;
  font-size: 13px;
  line-height: 1.6;
}

.dead-modal-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.dead-modal-btn {
  padding: 12px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 600;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.3s;
  font-size: 12px;
  letter-spacing: 0.5px;
}

.revive-btn {
  background: linear-gradient(135deg, #FFB6D9 0%, #FF69B4 100%);
  color: white;
  box-shadow: 0 8px 16px rgba(255, 105, 180, 0.2);
}

.revive-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(255, 105, 180, 0.3);
}

.restart-btn {
  background: linear-gradient(135deg, rgba(200, 230, 201, 0.2) 0%, rgba(200, 230, 201, 0.1) 100%);
  color: #558B2F;
  border: 2px solid rgba(102, 187, 106, 0.2);
}

.restart-btn:hover {
  background: linear-gradient(135deg, rgba(200, 230, 201, 0.3) 0%, rgba(200, 230, 201, 0.2) 100%);
  transform: translateY(-2px);
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🌿 植物养成</h1>
    <div class="header-info">连续7天照顾植物就能开花</div>
  </div>

  <div class="plant-area">
    <div class="plant-status">第 <span id="dayCount">0</span> 天</div>
    <svg class="plant-svg" viewBox="0 0 120 120" id="plantSvg">
      <ellipse cx="60" cy="110" rx="45" ry="12" fill="#8D6E63" opacity="0.2"/>
    </svg>
    <div class="plant-name" id="plantName">小种子</div>
    <div class="plant-stage" id="plantStage">种子阶段</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">💧 水分</div>
      <div class="stat-bar">
        <div class="stat-fill" id="waterFill" style="width: 100%"></div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-label">☀️ 阳光</div>
      <div class="stat-bar">
        <div class="stat-fill" id="sunFill" style="width: 100%"></div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-label">🌾 养分</div>
      <div class="stat-bar">
        <div class="stat-fill" id="nutrientFill" style="width: 100%"></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn" onclick="water()">
      <span class="btn-icon">💧</span>
      浇水
    </button>
    <button class="btn" onclick="sunlight()">
      <span class="btn-icon">☀️</span>
      晒太阳
    </button>
    <button class="btn" onclick="fertilize()">
      <span class="btn-icon">🌾</span>
      施肥
    </button>
  </div>

  <div class="message" id="message"></div>

  <div class="shop-section">
    <div class="shop-title">💝 道具商店</div>
    <div class="shop-items">
      <div class="shop-item" onclick="buyItem('revive')">
        <div class="item-icon">💚</div>
        <div class="item-name">救活药水</div>
        <div class="item-price">¥9.9</div>
        <div class="item-desc">复活枯萎的植物</div>
      </div>
      <div class="shop-item" onclick="buyItem('boost')">
        <div class="item-icon">⚡</div>
        <div class="item-name">加速肥料</div>
        <div class="item-price">¥4.9</div>
        <div class="item-desc">加速生长1天</div>
      </div>
      <div class="shop-item" onclick="buyItem('water')">
        <div class="item-icon">💦</div>
        <div class="item-name">超级水壶</div>
        <div class="item-price">¥2.9</div>
        <div class="item-desc">一次补满水分</div>
      </div>
      <div class="shop-item" onclick="buyItem('light')">
        <div class="item-icon">🔆</div>
        <div class="item-name">阳光灯</div>
        <div class="item-price">¥2.9</div>
        <div class="item-desc">一次补满阳光</div>
      </div>
    </div>
  </div>

  <div class="bottom-btns">
    <button class="reset-btn" onclick="resetGame()">重新开始</button>
    <button class="support-btn" onclick="support()">💝 支持我</button>
  </div>
</div>

<div class="dead-overlay" id="deadOverlay">
  <div class="dead-modal">
    <h2>😢 植物枯萎了</h2>
    <p>连续一天没有照顾植物，它就枯萎了...</p>
    <div class="dead-modal-btns">
      <button class="dead-modal-btn revive-btn" onclick="reviveFromModal()">💚 花钱救活</button>
      <button class="dead-modal-btn restart-btn" onclick="resetGame()">重新开始</button>
    </div>
  </div>
</div>

<script>
const STAGES = ['种子', '幼苗', '成长', '开花'];
const STAGE_NAMES = ['小种子', '小绿苗', '小植物', '开花了'];

let gameState = {
  water: 100,
  sun: 100,
  nutrient: 100,
  stage: 0,
  day: 0,
  lastCareDay: 0,
  isDead: false,
  lastUpdate: Date.now()
};

function loadGame() {
  const saved = localStorage.getItem('plantGame');
  if (saved) {
    gameState = JSON.parse(saved);
  }
}

function saveGame() {
  localStorage.setItem('plantGame', JSON.stringify(gameState));
}

function updateStats() {
  const now = Date.now();
  const elapsed = (now - gameState.lastUpdate) / 1000 / 60;

  gameState.water = Math.max(0, gameState.water - elapsed * 0.5);
  gameState.sun = Math.max(0, gameState.sun - elapsed * 0.5);
  gameState.nutrient = Math.max(0, gameState.nutrient - elapsed * 0.5);

  gameState.lastUpdate = now;

  const daysSinceLastCare = Math.floor((now - gameState.lastCareDay) / 1000 / 60 / 60 / 24);
  if (daysSinceLastCare > 1 && !gameState.isDead) {
    gameState.isDead = true;
    showDeadModal();
  }

  if (gameState.water > 60 && gameState.sun > 60 && gameState.nutrient > 60 && !gameState.isDead) {
    if (gameState.stage < STAGES.length - 1) {
      gameState.day++;
      if (gameState.day >= 7) {
        gameState.stage = STAGES.length - 1;
        showMessage('植物开花了！🌸');
      } else {
        gameState.stage = Math.min(gameState.stage + 1, STAGES.length - 1);
        showMessage(`第 ${gameState.day} 天，植物长大了！`);
      }
    }
  }

  saveGame();
}

function render() {
  document.getElementById('waterFill').style.width = gameState.water + '%';
  document.getElementById('sunFill').style.width = gameState.sun + '%';
  document.getElementById('nutrientFill').style.width = gameState.nutrient + '%';

  document.getElementById('plantName').textContent = STAGE_NAMES[gameState.stage];
  document.getElementById('plantStage').textContent = STAGES[gameState.stage] + '阶段';
  document.getElementById('dayCount').textContent = gameState.day;

  drawPlant();
}

function drawPlant() {
  const svg = document.getElementById('plantSvg');
  const existing = svg.querySelectorAll('g');
  existing.forEach(el => el.remove());

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

  const stage = gameState.stage;
  const health = (gameState.water + gameState.sun + gameState.nutrient) / 3;
  let color = health > 60 ? '#A8D5BA' : health > 30 ? '#FFD97D' : '#FF9999';

  if (gameState.isDead) {
    color = '#CCCCCC';
  }

  if (stage === 0) {
    g.innerHTML = `<circle cx="60" cy="80" r="10" fill="${color}" opacity="0.9"/>`;
  } else if (stage === 1) {
    g.innerHTML = `
      <path d="M 60 100 Q 58 80 60 60" stroke="${color}" stroke-width="4" fill="none" stroke-linecap="round"/>
      <ellipse cx="48" cy="75" rx="10" ry="14" fill="${color}" opacity="0.85" transform="rotate(-25 48 75)"/>
      <ellipse cx="72" cy="70" rx="10" ry="14" fill="${color}" opacity="0.85" transform="rotate(25 72 70)"/>
    `;
  } else if (stage === 2) {
    g.innerHTML = `
      <path d="M 60 100 Q 58 70 60 40" stroke="${color}" stroke-width="5" fill="none" stroke-linecap="round"/>
      <ellipse cx="38" cy="75" rx="14" ry="18" fill="${color}" opacity="0.8" transform="rotate(-35 38 75)"/>
      <ellipse cx="82" cy="70" rx="14" ry="18" fill="${color}" opacity="0.8" transform="rotate(35 82 70)"/>
      <ellipse cx="45" cy="50" rx="12" ry="16" fill="${color}" opacity="0.85" transform="rotate(-20 45 50)"/>
      <ellipse cx="75" cy="48" rx="12" ry="16" fill="${color}" opacity="0.85" transform="rotate(20 75 48)"/>
    `;
  } else {
    g.innerHTML = `
      <path d="M 60 100 Q 58 70 60 30" stroke="${color}" stroke-width="5" fill="none" stroke-linecap="round"/>
      <ellipse cx="38" cy="75" rx="14" ry="18" fill="${color}" opacity="0.8" transform="rotate(-35 38 75)"/>
      <ellipse cx="82" cy="70" rx="14" ry="18" fill="${color}" opacity="0.8" transform="rotate(35 82 70)"/>
      <ellipse cx="45" cy="50" rx="12" ry="16" fill="${color}" opacity="0.85" transform="rotate(-20 45 50)"/>
      <ellipse cx="75" cy="48" rx="12" ry="16" fill="${color}" opacity="0.85" transform="rotate(20 75 48)"/>
      <circle cx="60" cy="25" r="14" fill="#FFB6D9" opacity="0.9"/>
      <circle cx="48" cy="15" r="9" fill="#FFC0CB" opacity="0.85"/>
      <circle cx="72" cy="15" r="9" fill="#FFC0CB" opacity="0.85"/>
      <circle cx="60" cy="10" r="7" fill="#FFD4E5" opacity="0.8"/>
    `;
  }

  svg.appendChild(g);
}

function water() {
  if (gameState.isDead) return;
  gameState.water = Math.min(100, gameState.water + 30);
  gameState.lastCareDay = Date.now();
  showMessage('浇水了 💧');
  updateStats();
  render();
}

function sunlight() {
  if (gameState.isDead) return;
  gameState.sun = Math.min(100, gameState.sun + 30);
  gameState.lastCareDay = Date.now();
  showMessage('晒太阳了 ☀️');
  updateStats();
  render();
}

function fertilize() {
  if (gameState.isDead) return;
  gameState.nutrient = Math.min(100, gameState.nutrient + 30);
  gameState.lastCareDay = Date.now();
  showMessage('施肥了 🌾');
  updateStats();
  render();
}

function showMessage(text) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  setTimeout(() => {
    msg.textContent = '';
  }, 2000);
}

function showDeadModal() {
  document.getElementById('deadOverlay').style.display = 'flex';
}

function buyItem(type) {
  const AFDIAN_BASE = 'https://afdian.com/a/xiaojinian';
  alert('跳转到支付页面...');
  window.location.href = `${AFDIAN_BASE}?tab=shop`;
}

function reviveFromModal() {
  alert('跳转到支付页面...');
  window.location.href = 'https://afdian.com/a/xiaojinian?tab=shop';
}

function support() {
  window.location.href = 'https://afdian.com/a/xiaojinian?tab=shop';
}

function resetGame() {
  if (confirm('确定要重新开始吗？')) {
    gameState = {
      water: 100,
      sun: 100,
      nutrient: 100,
      stage: 0,
      day: 0,
      lastCareDay: Date.now(),
      isDead: false,
      lastUpdate: Date.now()
    };
    saveGame();
    document.getElementById('deadOverlay').style.display = 'none';
    render();
    showMessage('重新开始了！');
  }
}

loadGame();
if (gameState.lastCareDay === 0) {
  gameState.lastCareDay = Date.now();
  saveGame();
}
render();

setInterval(() => {
  updateStats();
  render();
}, 5000);
</script>

</body>
</html>
