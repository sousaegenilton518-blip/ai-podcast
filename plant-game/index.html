<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>植物养成</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; }
body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  background: white;
  border-radius: 24px;
  padding: 40px 30px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
  text-align: center;
}

h1 {
  color: #2E7D32;
  font-size: 24px;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

.header-info {
  font-size: 12px;
  color: #66BB6A;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.plant-area {
  background: linear-gradient(180deg, #E3F2FD 0%, #F1F8E9 100%);
  border-radius: 16px;
  padding: 40px 20px;
  margin-bottom: 30px;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
}

.plant-status {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 12px;
  padding: 4px 8px;
  background: rgba(255, 255, 255, 0.8);
  border-radius: 6px;
  color: #558B2F;
}

.plant-svg {
  width: 120px;
  height: 120px;
  margin-bottom: 20px;
}

.plant-name {
  font-size: 18px;
  font-weight: 600;
  color: #2E7D32;
  margin-bottom: 8px;
}

.plant-stage {
  font-size: 12px;
  color: #66BB6A;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 30px;
}

.stat {
  background: #F1F8E9;
  border-radius: 12px;
  padding: 12px;
}

.stat-label {
  font-size: 11px;
  color: #558B2F;
  margin-bottom: 6px;
  font-weight: 600;
  letter-spacing: 1px;
}

.stat-bar {
  width: 100%;
  height: 6px;
  background: #E8F5E9;
  border-radius: 3px;
  overflow: hidden;
}

.stat-fill {
  height: 100%;
  background: #66BB6A;
  border-radius: 3px;
  transition: width 0.3s ease;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.btn {
  padding: 12px 16px;
  border: 2px solid #C8E6C9;
  background: white;
  border-radius: 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: #2E7D32;
  transition: all 0.2s;
  font-family: 'Noto Sans SC', sans-serif;
  letter-spacing: 1px;
}

.btn:hover {
  background: #F1F8E9;
  border-color: #66BB6A;
  transform: translateY(-2px);
}

.btn:active {
  transform: translateY(0);
}

.btn-icon {
  font-size: 20px;
  display: block;
  margin-bottom: 4px;
}

.message {
  font-size: 12px;
  color: #66BB6A;
  margin-bottom: 20px;
  min-height: 16px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.shop-section {
  background: #FFF0F5;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1.5px solid #FFD4E5;
}

.shop-title {
  font-size: 14px;
  font-weight: 700;
  color: #C8607A;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.shop-items {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.shop-item {
  background: white;
  border: 1.5px solid #FFD4E5;
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.shop-item:hover {
  background: #FFE4E1;
  transform: translateY(-2px);
}

.item-icon {
  font-size: 24px;
  margin-bottom: 6px;
}

.item-name {
  font-size: 12px;
  font-weight: 600;
  color: #C8607A;
  margin-bottom: 4px;
}

.item-price {
  font-size: 11px;
  color: #FF69B4;
  font-weight: 700;
}

.item-desc {
  font-size: 10px;
  color: #999;
  margin-top: 4px;
}

.bottom-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.reset-btn {
  padding: 10px;
  background: #E8F5E9;
  border: 1px solid #C8E6C9;
  border-radius: 8px;
  color: #558B2F;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}

.reset-btn:hover {
  background: #C8E6C9;
}

.support-btn {
  padding: 10px;
  background: linear-gradient(135deg, #FFE4E1 0%, #FFD4E5 100%);
  border: 1.5px solid #FFB6D9;
  border-radius: 8px;
  color: #C8607A;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}

.support-btn:hover {
  background: linear-gradient(135deg, #FFD4E5 0%, #FFC0CB 100%);
  transform: translateY(-2px);
}

.dead-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.dead-modal {
  background: white;
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  max-width: 300px;
}

.dead-modal h2 {
  color: #E53935;
  margin-bottom: 10px;
  font-size: 20px;
}

.dead-modal p {
  color: #666;
  margin-bottom: 20px;
  font-size: 14px;
}

.dead-modal-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.dead-modal-btn {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-family: 'Noto Sans SC', sans-serif;
}

.revive-btn {
  background: #FF69B4;
  color: white;
}

.restart-btn {
  background: #E8F5E9;
  color: #2E7D32;
}
</style>
</head>
<body>

<div class="container">
  <h1>🌱 植物养成</h1>
  <div class="header-info">连续7天照顾植物就能开花！</div>

  <div class="plant-area">
    <div class="plant-status" id="plantStatus">第 <span id="dayCount">0</span> 天</div>
    <svg class="plant-svg" viewBox="0 0 120 120" id="plantSvg">
      <ellipse cx="60" cy="110" rx="45" ry="12" fill="#8D6E63" opacity="0.3"/>
    </svg>
    <div class="plant-name" id="plantName">小种子</div>
    <div class="plant-stage" id="plantStage">种子阶段</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">💧 水分</div>
      <div class="stat-bar">
        <div class="stat-fill" id="waterFill" style="width: 100%"></div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-label">☀️ 阳光</div>
      <div class="stat-bar">
        <div class="stat-fill" id="sunFill" style="width: 100%"></div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-label">🌾 养分</div>
      <div class="stat-bar">
        <div class="stat-fill" id="nutrientFill" style="width: 100%"></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn" onclick="water()">
      <span class="btn-icon">💧</span>
      浇水
    </button>
    <button class="btn" onclick="sunlight()">
      <span class="btn-icon">☀️</span>
      晒太阳
    </button>
    <button class="btn" onclick="fertilize()">
      <span class="btn-icon">🌾</span>
      施肥
    </button>
  </div>

  <div class="message" id="message"></div>

  <div class="shop-section">
    <div class="shop-title">💝 道具商店</div>
    <div class="shop-items">
      <div class="shop-item" onclick="buyItem('revive')">
        <div class="item-icon">💚</div>
        <div class="item-name">救活药水</div>
        <div class="item-price">¥9.9</div>
        <div class="item-desc">复活枯萎的植物</div>
      </div>
      <div class="shop-item" onclick="buyItem('boost')">
        <div class="item-icon">⚡</div>
        <div class="item-name">加速肥料</div>
        <div class="item-price">¥4.9</div>
        <div class="item-desc">加速生长1天</div>
      </div>
      <div class="shop-item" onclick="buyItem('water')">
        <div class="item-icon">💦</div>
        <div class="item-name">超级水壶</div>
        <div class="item-price">¥2.9</div>
        <div class="item-desc">一次补满水分</div>
      </div>
      <div class="shop-item" onclick="buyItem('light')">
        <div class="item-icon">🔆</div>
        <div class="item-name">阳光灯</div>
        <div class="item-price">¥2.9</div>
        <div class="item-desc">一次补满阳光</div>
      </div>
    </div>
  </div>

  <div class="bottom-btns">
    <button class="reset-btn" onclick="resetGame()">重新开始</button>
    <button class="support-btn" onclick="support()">💝 支持我</button>
  </div>
</div>

<div class="dead-overlay" id="deadOverlay">
  <div class="dead-modal">
    <h2>😢 植物枯萎了</h2>
    <p>连续一天没有照顾植物，它就枯萎了...</p>
    <div class="dead-modal-btns">
      <button class="dead-modal-btn revive-btn" onclick="reviveFromModal()">💚 花钱救活 (¥9.9)</button>
      <button class="dead-modal-btn restart-btn" onclick="resetGame()">重新开始</button>
    </div>
  </div>
</div>

<script>
const STAGES = ['种子', '幼苗', '成长', '开花'];
const STAGE_NAMES = ['小种子', '小绿苗', '小植物', '开花了'];

let gameState = {
  water: 100,
  sun: 100,
  nutrient: 100,
  stage: 0,
  day: 0,
  lastCareDay: 0,
  isDead: false,
  lastUpdate: Date.now()
};

function loadGame() {
  const saved = localStorage.getItem('plantGame');
  if (saved) {
    gameState = JSON.parse(saved);
  }
}

function saveGame() {
  localStorage.setItem('plantGame', JSON.stringify(gameState));
}

function updateStats() {
  const now = Date.now();
  const elapsed = (now - gameState.lastUpdate) / 1000 / 60; // 分钟

  // 每分钟衰退 0.5
  gameState.water = Math.max(0, gameState.water - elapsed * 0.5);
  gameState.sun = Math.max(0, gameState.sun - elapsed * 0.5);
  gameState.nutrient = Math.max(0, gameState.nutrient - elapsed * 0.5);

  gameState.lastUpdate = now;

  // 检查是否超过1天没有照顾
  const daysSinceLastCare = Math.floor((now - gameState.lastCareDay) / 1000 / 60 / 60 / 24);
  if (daysSinceLastCare > 1 && !gameState.isDead) {
    gameState.isDead = true;
    showDeadModal();
  }

  // 检查生长条件
  if (gameState.water > 60 && gameState.sun > 60 && gameState.nutrient > 60 && !gameState.isDead) {
    if (gameState.stage < STAGES.length - 1) {
      gameState.day++;
      if (gameState.day >= 7) {
        gameState.stage = STAGES.length - 1;
        showMessage('植物开花了！🌸');
      } else {
        gameState.stage = Math.min(gameState.stage + 1, STAGES.length - 1);
        showMessage(`第 ${gameState.day} 天，植物长大了！`);
      }
    }
  }

  saveGame();
}

function render() {
  // 更新进度条
  document.getElementById('waterFill').style.width = gameState.water + '%';
  document.getElementById('sunFill').style.width = gameState.sun + '%';
  document.getElementById('nutrientFill').style.width = gameState.nutrient + '%';

  // 更新植物名称和阶段
  document.getElementById('plantName').textContent = STAGE_NAMES[gameState.stage];
  document.getElementById('plantStage').textContent = STAGES[gameState.stage] + '阶段';
  document.getElementById('dayCount').textContent = gameState.day;

  // 绘制植物
  drawPlant();
}

function drawPlant() {
  const svg = document.getElementById('plantSvg');
  const existing = svg.querySelectorAll('g');
  existing.forEach(el => el.remove());

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

  const stage = gameState.stage;
  const health = (gameState.water + gameState.sun + gameState.nutrient) / 3;
  let color = health > 60 ? '#66BB6A' : health > 30 ? '#FDD835' : '#E53935';

  if (gameState.isDead) {
    color = '#999';
  }

  if (stage === 0) {
    g.innerHTML = `<circle cx="60" cy="80" r="8" fill="${color}"/>`;
  } else if (stage === 1) {
    g.innerHTML = `
      <line x1="60" y1="100" x2="60" y2="60" stroke="${color}" stroke-width="3"/>
      <ellipse cx="50" cy="75" rx="8" ry="12" fill="${color}"/>
      <ellipse cx="70" cy="70" rx="8" ry="12" fill="${color}"/>
    `;
  } else if (stage === 2) {
    g.innerHTML = `
      <line x1="60" y1="100" x2="60" y2="40" stroke="${color}" stroke-width="4"/>
      <ellipse cx="40" cy="70" rx="12" ry="16" fill="${color}"/>
      <ellipse cx="80" cy="65" rx="12" ry="16" fill="${color}"/>
      <ellipse cx="50" cy="50" rx="10" ry="14" fill="${color}"/>
      <ellipse cx="70" cy="48" rx="10" ry="14" fill="${color}"/>
    `;
  } else {
    g.innerHTML = `
      <line x1="60" y1="100" x2="60" y2="30" stroke="${color}" stroke-width="4"/>
      <ellipse cx="40" cy="70" rx="12" ry="16" fill="${color}"/>
      <ellipse cx="80" cy="65" rx="12" ry="16" fill="${color}"/>
      <ellipse cx="50" cy="50" rx="10" ry="14" fill="${color}"/>
      <ellipse cx="70" cy="48" rx="10" ry="14" fill="${color}"/>
      <circle cx="60" cy="30" r="12" fill="#FF69B4"/>
      <circle cx="50" cy="22" r="8" fill="#FFB6D9"/>
      <circle cx="70" cy="22" r="8" fill="#FFB6D9"/>
    `;
  }

  svg.appendChild(g);
}

function water() {
  if (gameState.isDead) return;
  gameState.water = Math.min(100, gameState.water + 30);
  gameState.lastCareDay = Date.now();
  showMessage('浇水了 💧');
  updateStats();
  render();
}

function sunlight() {
  if (gameState.isDead) return;
  gameState.sun = Math.min(100, gameState.sun + 30);
  gameState.lastCareDay = Date.now();
  showMessage('晒太阳了 ☀️');
  updateStats();
  render();
}

function fertilize() {
  if (gameState.isDead) return;
  gameState.nutrient = Math.min(100, gameState.nutrient + 30);
  gameState.lastCareDay = Date.now();
  showMessage('施肥了 🌾');
  updateStats();
  render();
}

function showMessage(text) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  setTimeout(() => {
    msg.textContent = '';
  }, 2000);
}

function showDeadModal() {
  document.getElementById('deadOverlay').style.display = 'flex';
}

function buyItem(type) {
  const AFDIAN_BASE = 'https://afdian.com/a/xiaojinian';

  let price = 0;
  let itemName = '';

  switch(type) {
    case 'revive':
      price = 9.9;
      itemName = '救活药水';
      break;
    case 'boost':
      price = 4.9;
      itemName = '加速肥料';
      break;
    case 'water':
      price = 2.9;
      itemName = '超级水壶';
      break;
    case 'light':
      price = 2.9;
      itemName = '阳光灯';
      break;
  }

  alert(`购买 ${itemName} (¥${price})\n\n点击确定后将跳转到支付页面`);
  window.location.href = `${AFDIAN_BASE}?tab=shop`;
}

function reviveFromModal() {
  alert('购买救活药水 (¥9.9)\n\n点击确定后将跳转到支付页面');
  window.location.href = 'https://afdian.com/a/xiaojinian?tab=shop';
}

function support() {
  window.location.href = 'https://afdian.com/a/xiaojinian?tab=shop';
}

function resetGame() {
  if (confirm('确定要重新开始吗？')) {
    gameState = {
      water: 100,
      sun: 100,
      nutrient: 100,
      stage: 0,
      day: 0,
      lastCareDay: Date.now(),
      isDead: false,
      lastUpdate: Date.now()
    };
    saveGame();
    document.getElementById('deadOverlay').style.display = 'none';
    render();
    showMessage('重新开始了！');
  }
}

// 初始化
loadGame();
if (gameState.lastCareDay === 0) {
  gameState.lastCareDay = Date.now();
  saveGame();
}
render();

// 定时更新
setInterval(() => {
  updateStats();
  render();
}, 5000);
</script>

</body>
</html>
