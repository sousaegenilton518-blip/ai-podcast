<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>植物养成</title>
<link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; }
body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #FFF8E7 0%, #FFF5F0 30%, #F0F8F5 70%, #E8F5F0 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* 背景装饰 - 云朵 */
body::before {
  content: '';
  position: fixed;
  top: 5%;
  right: 5%;
  width: 200px;
  height: 100px;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100"><path d="M 30 60 Q 20 40 40 30 Q 50 20 70 25 Q 80 15 100 20 Q 110 10 130 20 Q 150 15 160 35 Q 170 40 165 60 Z" fill="%23FFF5E6" opacity="0.8" stroke="%23F5D5B8" stroke-width="1.5"/></svg>') no-repeat center;
  background-size: contain;
  pointer-events: none;
  animation: float 6s ease-in-out infinite;
}

body::after {
  content: '';
  position: fixed;
  bottom: 10%;
  left: 5%;
  width: 180px;
  height: 90px;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 90"><path d="M 20 55 Q 10 35 35 25 Q 45 15 65 20 Q 75 8 95 15 Q 110 5 130 18 Q 150 12 160 35 Q 168 42 160 60 Z" fill="%23FFF9F0" opacity="0.7" stroke="%23F5D5B8" stroke-width="1.5"/></svg>') no-repeat center;
  background-size: contain;
  pointer-events: none;
  animation: float 8s ease-in-out infinite reverse;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
}

.container {
  background: linear-gradient(135deg, #FFFBF5 0%, #FFF9F0 50%, #F5F9F8 100%);
  border-radius: 50px;
  padding: 50px 35px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 30px 80px rgba(200, 96, 122, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.8);
  text-align: center;
  position: relative;
  z-index: 1;
  border: 3px solid #F5D5B8;
  backdrop-filter: blur(10px);
}

.header {
  margin-bottom: 35px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 30px;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30"><g><circle cx="10" cy="8" r="2.5" fill="%23FFE5B4" opacity="0.8"/><circle cx="20" cy="5" r="2" fill="%23FFE5B4" opacity="0.7"/><circle cx="30" cy="7" r="2.5" fill="%23FFE5B4" opacity="0.8"/><circle cx="40" cy="4" r="2" fill="%23FFE5B4" opacity="0.7"/><circle cx="50" cy="8" r="2.5" fill="%23FFE5B4" opacity="0.8"/></g></svg>') no-repeat center;
  background-size: contain;
}

h1 {
  color: #D4845C;
  font-size: 32px;
  margin-bottom: 8px;
  letter-spacing: 1px;
  font-weight: 700;
  text-shadow: 2px 2px 4px rgba(212, 132, 92, 0.1);
}

.header-info {
  font-size: 13px;
  color: #B8956A;
  letter-spacing: 0.5px;
  font-weight: 400;
}

.plant-area {
  background: linear-gradient(135deg, #FFFEF9 0%, #FFF8F0 40%, #F5F9F8 100%);
  border-radius: 40px;
  padding: 50px 25px;
  margin-bottom: 35px;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  border: 3px dashed #E8C4A0;
  overflow: hidden;
}

.plant-area::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80"><defs><pattern id="grass" x="0" y="0" width="40" height="80" patternUnits="userSpaceOnUse"><path d="M 5 80 Q 8 60 10 40 Q 12 20 15 0" stroke="%23A8D5BA" stroke-width="1.5" fill="none" opacity="0.6"/><path d="M 20 80 Q 22 55 25 30 Q 27 10 30 0" stroke="%23B8E0C8" stroke-width="1.5" fill="none" opacity="0.5"/><path d="M 35 80 Q 37 65 40 45 Q 42 25 45 0" stroke="%23A8D5BA" stroke-width="1.5" fill="none" opacity="0.6"/></pattern></defs><rect width="400" height="80" fill="url(%23grass)"/></svg>') repeat-x;
  background-size: auto 100%;
  opacity: 0.7;
}

.plant-status {
  position: absolute;
  top: 15px;
  right: 15px;
  font-size: 12px;
  padding: 10px 16px;
  background: linear-gradient(135deg, #FFE5B4 0%, #FFD9A3 100%);
  border-radius: 25px;
  color: #D4845C;
  font-weight: 700;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 12px rgba(212, 132, 92, 0.15);
  border: 2px solid #F5D5B8;
}

.plant-svg {
  width: 160px;
  height: 160px;
  margin-bottom: 20px;
  filter: drop-shadow(0 8px 16px rgba(212, 132, 92, 0.15));
  position: relative;
  z-index: 2;
}

.plant-name {
  font-size: 22px;
  font-weight: 700;
  color: #D4845C;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
  text-shadow: 1px 1px 2px rgba(212, 132, 92, 0.1);
}

.plant-stage {
  font-size: 12px;
  color: #B8956A;
  margin-bottom: 15px;
  letter-spacing: 1px;
  font-weight: 400;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 30px;
}

.stat {
  background: linear-gradient(135deg, rgba(255, 229, 180, 0.15) 0%, rgba(168, 213, 186, 0.1) 100%);
  border-radius: 20px;
  padding: 16px;
  border: 2px solid #E8C4A0;
  position: relative;
}

.stat::before {
  content: '';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 16px;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

.stat:nth-child(1)::before {
  background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 16"><path d="M 10 2 Q 8 4 8 6 Q 8 8 10 10 Q 12 8 12 6 Q 12 4 10 2 M 6 10 Q 4 12 4 14 L 16 14 Q 16 12 14 10" fill="%234A90E2" opacity="0.8"/></svg>');
}

.stat:nth-child(2)::before {
  background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 16"><circle cx="10" cy="8" r="6" fill="%23FFD700" opacity="0.8"/><path d="M 10 2 L 12 5 L 15 5 L 13 7 L 14 10 L 10 8 L 6 10 L 7 7 L 5 5 L 8 5 Z" fill="%23FFC700" opacity="0.6"/></svg>');
}

.stat:nth-child(3)::before {
  background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 16"><path d="M 10 2 L 12 6 L 16 6 L 13 9 L 14 13 L 10 10 L 6 13 L 7 9 L 4 6 L 8 6 Z" fill="%23A8D5BA" opacity="0.8"/></svg>');
}

.stat-label {
  font-size: 11px;
  color: #D4845C;
  margin-bottom: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.stat-bar {
  width: 100%;
  height: 10px;
  background: rgba(212, 132, 92, 0.1);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid rgba(212, 132, 92, 0.15);
}

.stat-fill {
  height: 100%;
  background: linear-gradient(90deg, #FFB6D9 0%, #FF69B4 100%);
  border-radius: 5px;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 25px;
}

.btn {
  padding: 16px 14px;
  border: 2px solid #E8C4A0;
  background: linear-gradient(135deg, rgba(255, 229, 180, 0.2) 0%, rgba(255, 219, 172, 0.1) 100%);
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  color: #D4845C;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: 'Noto Sans SC', sans-serif;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 12px rgba(212, 132, 92, 0.08);
}

.btn:hover {
  background: linear-gradient(135deg, rgba(255, 229, 180, 0.35) 0%, rgba(255, 219, 172, 0.25) 100%);
  border-color: #D4845C;
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(212, 132, 92, 0.15);
}

.btn:active {
  transform: translateY(-2px);
}

.btn-icon {
  font-size: 24px;
  display: block;
  margin-bottom: 6px;
}

.message {
  font-size: 13px;
  color: #D4845C;
  margin-bottom: 20px;
  min-height: 20px;
  animation: fadeIn 0.3s ease;
  font-weight: 600;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

.shop-section {
  background: linear-gradient(135deg, rgba(255, 229, 180, 0.12) 0%, rgba(255, 219, 172, 0.08) 100%);
  border-radius: 28px;
  padding: 24px;
  margin-bottom: 25px;
  border: 2px solid #E8C4A0;
  position: relative;
}

.shop-section::before {
  content: '';
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 24px;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 24"><path d="M 5 8 L 8 2 L 15 0 L 22 2 L 25 8 L 20 12 L 10 12 Z" fill="%23FFB6D9" opacity="0.8"/><path d="M 8 12 L 6 20 Q 6 22 8 22 L 22 22 Q 24 22 24 20 L 22 12 Z" fill="%23FFC0CB" opacity="0.7"/></svg>') no-repeat center;
  background-size: contain;
}

.shop-title {
  font-size: 14px;
  font-weight: 700;
  color: #D4845C;
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

.shop-items {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.shop-item {
  background: linear-gradient(135deg, #FFFBF5 0%, #FFF9F0 100%);
  border: 2px solid #E8C4A0;
  border-radius: 18px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 12px rgba(212, 132, 92, 0.08);
}

.shop-item:hover {
  background: linear-gradient(135deg, rgba(255, 229, 180, 0.15) 0%, rgba(255, 219, 172, 0.1) 100%);
  border-color: #D4845C;
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(212, 132, 92, 0.15);
}

.item-icon {
  font-size: 32px;
  margin-bottom: 8px;
}

.item-name {
  font-size: 12px;
  font-weight: 700;
  color: #D4845C;
  margin-bottom: 4px;
}

.item-price {
  font-size: 11px;
  color: #FF69B4;
  font-weight: 700;
}

.item-desc {
  font-size: 10px;
  color: #B8956A;
  margin-top: 4px;
}

.bottom-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.reset-btn {
  padding: 14px;
  background: linear-gradient(135deg, rgba(168, 213, 186, 0.2) 0%, rgba(168, 213, 186, 0.1) 100%);
  border: 2px solid #A8D5BA;
  border-radius: 18px;
  color: #558B2F;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.3s;
  font-weight: 700;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 12px rgba(168, 213, 186, 0.1);
}

.reset-btn:hover {
  background: linear-gradient(135deg, rgba(168, 213, 186, 0.3) 0%, rgba(168, 213, 186, 0.2) 100%);
  border-color: #558B2F;
  transform: translateY(-3px);
  box-shadow: 0 8px 16px rgba(168, 213, 186, 0.15);
}

.support-btn {
  padding: 14px;
  background: linear-gradient(135deg, rgba(255, 182, 217, 0.25) 0%, rgba(255, 192, 203, 0.15) 100%);
  border: 2px solid #FFB6D9;
  border-radius: 18px;
  color: #D4845C;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.3s;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 12px rgba(255, 182, 217, 0.15);
}

.support-btn:hover {
  background: linear-gradient(135deg, rgba(255, 182, 217, 0.35) 0%, rgba(255, 192, 203, 0.25) 100%);
  border-color: #D4845C;
  transform: translateY(-3px);
  box-shadow: 0 8px 16px rgba(255, 182, 217, 0.2);
}

.dead-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  backdrop-filter: blur(6px);
}

.dead-modal {
  background: linear-gradient(135deg, #FFFBF5 0%, #FFF9F0 100%);
  border-radius: 35px;
  padding: 45px 35px;
  text-align: center;
  max-width: 340px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
  border: 3px solid #F5D5B8;
}

.dead-modal h2 {
  color: #D4845C;
  margin-bottom: 15px;
  font-size: 24px;
  font-weight: 700;
}

.dead-modal p {
  color: #B8956A;
  margin-bottom: 28px;
  font-size: 13px;
  line-height: 1.6;
}

.dead-modal-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.dead-modal-btn {
  padding: 14px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  font-weight: 700;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.3s;
  font-size: 12px;
  letter-spacing: 0.5px;
}

.revive-btn {
  background: linear-gradient(135deg, #FFB6D9 0%, #FF69B4 100%);
  color: white;
  box-shadow: 0 8px 20px rgba(255, 105, 180, 0.25);
}

.revive-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 28px rgba(255, 105, 180, 0.35);
}

.restart-btn {
  background: linear-gradient(135deg, rgba(168, 213, 186, 0.25) 0%, rgba(168, 213, 186, 0.15) 100%);
  color: #558B2F;
  border: 2px solid #A8D5BA;
}

.restart-btn:hover {
  background: linear-gradient(135deg, rgba(168, 213, 186, 0.35) 0%, rgba(168, 213, 186, 0.25) 100%);
  transform: translateY(-3px);
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🌿 植物养成</h1>
    <div class="header-info">连续7天照顾植物就能开花</div>
  </div>

  <div class="plant-area">
    <div class="plant-status">第 <span id="dayCount">0</span> 天</div>
    <svg class="plant-svg" viewBox="0 0 140 160" id="plantSvg">
      <defs>
        <filter id="handDrawn">
          <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" />
        </filter>
      </defs>
      <ellipse cx="70" cy="150" rx="50" ry="14" fill="#8D6E63" opacity="0.25"/>
    </svg>
    <div class="plant-name" id="plantName">小种子</div>
    <div class="plant-stage" id="plantStage">种子阶段</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">水分</div>
      <div class="stat-bar">
        <div class="stat-fill" id="waterFill" style="width: 100%"></div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-label">阳光</div>
      <div class="stat-bar">
        <div class="stat-fill" id="sunFill" style="width: 100%"></div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-label">养分</div>
      <div class="stat-bar">
        <div class="stat-fill" id="nutrientFill" style="width: 100%"></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn" onclick="water()">
      <span class="btn-icon">💧</span>
      浇水
    </button>
    <button class="btn" onclick="sunlight()">
      <span class="btn-icon">☀️</span>
      晒太阳
    </button>
    <button class="btn" onclick="fertilize()">
      <span class="btn-icon">🌾</span>
      施肥
    </button>
  </div>

  <div class="message" id="message"></div>

  <div class="shop-section">
    <div class="shop-title">💝 道具商店</div>
    <div class="shop-items">
      <div class="shop-item" onclick="buyItem('revive')">
        <div class="item-icon">💚</div>
        <div class="item-name">救活药水</div>
        <div class="item-price">¥9.9</div>
        <div class="item-desc">复活枯萎的植物</div>
      </div>
      <div class="shop-item" onclick="buyItem('boost')">
        <div class="item-icon">⚡</div>
        <div class="item-name">加速肥料</div>
        <div class="item-price">¥4.9</div>
        <div class="item-desc">加速生长1天</div>
      </div>
      <div class="shop-item" onclick="buyItem('water')">
        <div class="item-icon">💦</div>
        <div class="item-name">超级水壶</div>
        <div class="item-price">¥2.9</div>
        <div class="item-desc">一次补满水分</div>
      </div>
      <div class="shop-item" onclick="buyItem('light')">
        <div class="item-icon">🔆</div>
        <div class="item-name">阳光灯</div>
        <div class="item-price">¥2.9</div>
        <div class="item-desc">一次补满阳光</div>
      </div>
    </div>
  </div>

  <div class="bottom-btns">
    <button class="reset-btn" onclick="resetGame()">重新开始</button>
    <button class="support-btn" onclick="support()">💝 支持我</button>
  </div>
</div>

<div class="dead-overlay" id="deadOverlay">
  <div class="dead-modal">
    <h2>😢 植物枯萎了</h2>
    <p>连续一天没有照顾植物，它就枯萎了...</p>
    <div class="dead-modal-btns">
      <button class="dead-modal-btn revive-btn" onclick="reviveFromModal()">💚 花钱救活</button>
      <button class="dead-modal-btn restart-btn" onclick="resetGame()">重新开始</button>
    </div>
  </div>
</div>

<script>
const STAGES = ['种子', '幼苗', '成长', '开花'];
const STAGE_NAMES = ['小种子', '小绿苗', '小植物', '开花了'];

let gameState = {
  water: 100,
  sun: 100,
  nutrient: 100,
  stage: 0,
  day: 0,
  lastCareDay: 0,
  isDead: false,
  lastUpdate: Date.now()
};

function loadGame() {
  const saved = localStorage.getItem('plantGame');
  if (saved) {
    gameState = JSON.parse(saved);
  }
}

function saveGame() {
  localStorage.setItem('plantGame', JSON.stringify(gameState));
}

function updateStats() {
  const now = Date.now();
  const elapsed = (now - gameState.lastUpdate) / 1000 / 60;

  gameState.water = Math.max(0, gameState.water - elapsed * 0.5);
  gameState.sun = Math.max(0, gameState.sun - elapsed * 0.5);
  gameState.nutrient = Math.max(0, gameState.nutrient - elapsed * 0.5);

  gameState.lastUpdate = now;

  const daysSinceLastCare = Math.floor((now - gameState.lastCareDay) / 1000 / 60 / 60 / 24);
  if (daysSinceLastCare > 1 && !gameState.isDead) {
    gameState.isDead = true;
    showDeadModal();
  }

  if (gameState.water > 60 && gameState.sun > 60 && gameState.nutrient > 60 && !gameState.isDead) {
    if (gameState.stage < STAGES.length - 1) {
      gameState.day++;
      if (gameState.day >= 7) {
        gameState.stage = STAGES.length - 1;
        showMessage('植物开花了！🌸');
      } else {
        gameState.stage = Math.min(gameState.stage + 1, STAGES.length - 1);
        showMessage(`第 ${gameState.day} 天，植物长大了！`);
      }
    }
  }

  saveGame();
}

function render() {
  document.getElementById('waterFill').style.width = gameState.water + '%';
  document.getElementById('sunFill').style.width = gameState.sun + '%';
  document.getElementById('nutrientFill').style.width = gameState.nutrient + '%';

  document.getElementById('plantName').textContent = STAGE_NAMES[gameState.stage];
  document.getElementById('plantStage').textContent = STAGES[gameState.stage] + '阶段';
  document.getElementById('dayCount').textContent = gameState.day;

  drawPlant();
}

function drawPlant() {
  const svg = document.getElementById('plantSvg');
  const existing = svg.querySelectorAll('g');
  existing.forEach(el => el.remove());

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

  const stage = gameState.stage;
  const health = (gameState.water + gameState.sun + gameState.nutrient) / 3;
  let color = health > 60 ? '#A8D5BA' : health > 30 ? '#FFD97D' : '#FF9999';

  if (gameState.isDead) {
    color = '#CCCCCC';
  }

  if (stage === 0) {
    g.innerHTML = `

function water() {
  if (gameState.isDead) return;
  gameState.water = Math.min(100, gameState.water + 30);
  gameState.lastCareDay = Date.now();
  showMessage('浇水了 💧');
  updateStats();
  render();
}

function sunlight() {
  if (gameState.isDead) return;
  gameState.sun = Math.min(100, gameState.sun + 30);
  gameState.lastCareDay = Date.now();
  showMessage('晒太阳了 ☀️');
  updateStats();
  render();
}

function fertilize() {
  if (gameState.isDead) return;
  gameState.nutrient = Math.min(100, gameState.nutrient + 30);
  gameState.lastCareDay = Date.now();
  showMessage('施肥了 🌾');
  updateStats();
  render();
}

function showMessage(text) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  setTimeout(() => {
    msg.textContent = '';
  }, 2000);
}

function showDeadModal() {
  document.getElementById('deadOverlay').style.display = 'flex';
}

function buyItem(type) {
  const AFDIAN_BASE = 'https://afdian.com/a/xiaojinian';
  alert('跳转到支付页面...');
  window.location.href = `${AFDIAN_BASE}?tab=shop`;
}

function reviveFromModal() {
  alert('跳转到支付页面...');
  window.location.href = 'https://afdian.com/a/xiaojinian?tab=shop';
}

function support() {
  window.location.href = 'https://afdian.com/a/xiaojinian?tab=shop';
}

function resetGame() {
  if (confirm('确定要重新开始吗？')) {
    gameState = {
      water: 100,
      sun: 100,
      nutrient: 100,
      stage: 0,
      day: 0,
      lastCareDay: Date.now(),
      isDead: false,
      lastUpdate: Date.now()
    };
    saveGame();
    document.getElementById('deadOverlay').style.display = 'none';
    render();
    showMessage('重新开始了！');
  }
}

loadGame();
if (gameState.lastCareDay === 0) {
  gameState.lastCareDay = Date.now();
  saveGame();
}
render();

setInterval(() => {
  updateStats();
  render();
}, 5000);
</script>
